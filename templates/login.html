{% extends "base.html" %}

{% block title %}Log In — SmartDigest{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Welcome to SmartDigest</h2>
            <p class="text-gray-500 mt-2">Log in to manage your digests.</p>
        </div>

        <!-- Tab switcher -->
        <div class="flex border-b border-gray-200 mb-6">
            <button id="tab-login" onclick="showTab('login')"
                class="flex-1 pb-3 text-sm font-medium text-blue-600 border-b-2 border-blue-600 transition-colors">
                Log In
            </button>
            <button id="tab-register" onclick="showTab('register')"
                class="flex-1 pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors">
                Sign Up
            </button>
        </div>

        <!-- Login form -->
        <form id="login-form" action="/auth/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="login-password" required placeholder="••••••••" minlength="8"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <button type="button" onclick="togglePassword('login-password', 'eye-login')"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <span id="eye-login">👁</span>
                    </button>
                </div>
            </div>
            <div id="login-errors" class="hidden text-red-600 text-sm"></div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2.5 px-4 rounded-lg hover:bg-blue-700 font-medium text-sm transition-colors">
                Log In
            </button>
        </form>

        <!-- Register form (hidden by default) -->
        <form id="register-form" action="/auth/register" method="POST" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" name="name" required placeholder="Your name"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="reg-password" required placeholder="Min 8 characters" minlength="8"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <button type="button" onclick="togglePassword('reg-password', 'eye-reg')"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <span id="eye-reg">👁</span>
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="reg-confirm" required placeholder="Repeat your password" minlength="8"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <button type="button" onclick="togglePassword('reg-confirm', 'eye-confirm')"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <span id="eye-confirm">👁</span>
                    </button>
                </div>
            </div>
            <div id="register-errors" class="hidden text-red-600 text-sm"></div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2.5 px-4 rounded-lg hover:bg-blue-700 font-medium text-sm transition-colors">
                Create Account
            </button>
        </form>
    </div>
</div>

<script>
    function showTab(tab) {
        var loginForm = document.getElementById("login-form");
        var registerForm = document.getElementById("register-form");
        var tabLogin = document.getElementById("tab-login");
        var tabRegister = document.getElementById("tab-register");

        if (tab === "login") {
            loginForm.classList.remove("hidden");
            registerForm.classList.add("hidden");
            tabLogin.classList.add("text-blue-600", "border-blue-600");
            tabLogin.classList.remove("text-gray-400", "border-transparent");
            tabRegister.classList.add("text-gray-400", "border-transparent");
            tabRegister.classList.remove("text-blue-600", "border-blue-600");
        } else {
            loginForm.classList.add("hidden");
            registerForm.classList.remove("hidden");
            tabRegister.classList.add("text-blue-600", "border-blue-600");
            tabRegister.classList.remove("text-gray-400", "border-transparent");
            tabLogin.classList.add("text-gray-400", "border-transparent");
            tabLogin.classList.remove("text-blue-600", "border-blue-600");
        }
    }

    // Toggle password visibility
    function togglePassword(inputId, iconId) {
        var input = document.getElementById(inputId);
        var icon  = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.textContent = "🙈";
        } else {
            input.type = "password";
            icon.textContent = "👁";
        }
    }

    // Handle form submissions via fetch for error display
    document.getElementById("login-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        var form = e.target;
        var errDiv = document.getElementById("login-errors");
        errDiv.classList.add("hidden");

        try {
            var resp = await fetch(form.action, {
                method: "POST",
                body: new FormData(form),
                redirect: "follow",
            });
            if (resp.redirected) {
                // replace() removes login from history — pressing back after
                // login won't land you back on the login page.
                window.location.replace(resp.url);
                return;
            }
            if (!resp.ok) {
                var data = await resp.json();
                errDiv.textContent = data.detail || "Login failed";
                errDiv.classList.remove("hidden");
            }
        } catch(ex) {
            errDiv.textContent = "Network error: " + ex.message;
            errDiv.classList.remove("hidden");
        }
    });

    document.getElementById("register-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        var form = e.target;
        var errDiv = document.getElementById("register-errors");
        errDiv.classList.add("hidden");

        // Client-side confirm password check
        var password = document.getElementById("reg-password").value;
        var confirm  = document.getElementById("reg-confirm").value;
        if (password !== confirm) {
            errDiv.textContent = "Passwords do not match.";
            errDiv.classList.remove("hidden");
            return;
        }

        try {
            var resp = await fetch(form.action, {
                method: "POST",
                body: new FormData(form),
                redirect: "follow",
            });
            if (resp.redirected) {
                window.location.replace(resp.url);
                return;
            }
            if (!resp.ok) {
                var data = await resp.json();
                errDiv.textContent = data.detail || "Registration failed";
                errDiv.classList.remove("hidden");
            }
        } catch(ex) {
            errDiv.textContent = "Network error: " + ex.message;
            errDiv.classList.remove("hidden");
        }
    });
</script>
{% endblock %}
