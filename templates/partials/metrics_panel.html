<!-- HTMX-polled dashboard metric cards (replaces grid-4 innerHTML) -->
<div class="metric-card">
  <div class="label">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
    Pipeline runs (24h)
  </div>
  <div class="value">{{ metrics.total_jobs }}</div>
</div>
<div class="metric-card">
  <div class="label">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Successful
  </div>
  <div class="value success">{{ metrics.by_status.done }}</div>
</div>
<div class="metric-card">
  <div class="label">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--destructive)" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Failed
  </div>
  <div class="value destructive">{{ metrics.by_status.failed }}</div>
</div>
<div class="metric-card">
  <div class="label">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Avg fetch
  </div>
  <div class="value">{{ metrics.stage_avg_ms.fetch }}ms</div>
</div>
