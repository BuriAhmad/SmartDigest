<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SmartDigest{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: hsl(220 20% 6%);
  --fg: hsl(210 20% 92%);
  --card: hsl(220 18% 9%);
  --card-fg: hsl(210 20% 92%);
  --primary: hsl(172 66% 50%);
  --primary-fg: hsl(220 20% 6%);
  --secondary: hsl(220 16% 14%);
  --secondary-fg: hsl(210 20% 80%);
  --muted: hsl(220 14% 12%);
  --muted-fg: hsl(215 12% 50%);
  --border: hsl(220 14% 16%);
  --success: hsl(152 60% 45%);
  --warning: hsl(38 92% 50%);
  --info: hsl(210 80% 56%);
  --destructive: hsl(0 72% 55%);
  --sidebar-bg: hsl(220 20% 5%);
  --radius: 0.5rem;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased; }
code, .mono { font-family: 'JetBrains Mono', monospace; }
a { color: inherit; text-decoration: none; }

.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 224px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--sidebar-bg); flex-shrink: 0; }
.sidebar-header { display: flex; align-items: center; gap: 8px; padding: 0 20px; height: 56px; border-bottom: 1px solid var(--border); }
.sidebar-header svg { color: var(--primary); }
.sidebar-header span { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
.sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: var(--radius); font-size: 14px; font-weight: 500; color: var(--muted-fg); transition: all 0.15s; }
.sidebar-nav a:hover, .sidebar-nav a.active { background: var(--secondary); color: var(--fg); }
.sidebar-footer { border-top: 1px solid var(--border); padding: 12px; }
.sidebar-footer .email { padding: 0 12px; font-size: 12px; color: var(--muted-fg); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-footer .logout-btn { display: block; padding: 6px 12px; font-size: 12px; color: var(--muted-fg); border-radius: var(--radius); cursor: pointer; background: none; font-family: inherit; width: 100%; text-align: left; transition: all 0.15s; }
.sidebar-footer .logout-btn:hover { background: var(--secondary); color: var(--destructive); }

.main { flex: 1; overflow-y: auto; }
.content { max-width: 1152px; margin: 0 auto; padding: 24px; }

h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: var(--muted-fg); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
.section-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-fg); margin-bottom: 12px; }

.btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; font-family: inherit; }
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover { opacity: 0.9; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--fg); }
.btn-outline:hover { background: var(--secondary); }
.btn-ghost { background: transparent; color: var(--muted-fg); }
.btn-ghost:hover { background: var(--secondary); color: var(--fg); }
.btn-sm { padding: 4px 12px; font-size: 12px; height: 28px; }
.btn-destructive-text { color: var(--destructive); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

.metric-card { border: 1px solid var(--border); background: var(--card); border-radius: var(--radius); padding: 16px; }
.metric-card .label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted-fg); margin-bottom: 4px; }
.metric-card .value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.metric-card .value.success { color: var(--success); }
.metric-card .value.destructive { color: var(--destructive); }

.card { border: 1px solid var(--border); background: var(--card); border-radius: var(--radius); padding: 16px; transition: border-color 0.15s; }
.card:hover { border-color: hsl(172 66% 50% / 0.3); }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.card .desc { font-size: 12px; color: var(--muted-fg); margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card .schedule { font-size: 12px; color: var(--muted-fg); font-family: 'JetBrains Mono', monospace; }

.tag { display: inline-block; background: var(--secondary); color: var(--secondary-fg); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; margin-right: 4px; margin-bottom: 4px; }
.tag-exclude { background: hsl(0 72% 55% / 0.12); color: hsl(0 72% 65%); }
.tags { margin-bottom: 12px; }

.actions { display: flex; gap: 8px; }

.badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; border: 1px solid; }
.badge-delivered { background: hsl(152 60% 45% / 0.15); color: var(--success); border-color: hsl(152 60% 45% / 0.2); }
.badge-processing { background: hsl(38 92% 50% / 0.15); color: var(--warning); border-color: hsl(38 92% 50% / 0.2); }
.badge-failed { background: hsl(0 72% 55% / 0.15); color: var(--destructive); border-color: hsl(0 72% 55% / 0.2); }
.badge-queued { background: hsl(210 80% 56% / 0.15); color: var(--info); border-color: hsl(210 80% 56% / 0.2); }
.badge-processing .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s ease-in-out infinite; }

.digest-row { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); background: var(--card); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px; transition: border-color 0.15s; cursor: pointer; }
.digest-row:hover { border-color: hsl(172 66% 50% / 0.3); }
.digest-row .left { display: flex; align-items: center; gap: 12px; }
.digest-row .topic { font-size: 14px; font-weight: 500; }
.digest-row .count { font-size: 12px; color: var(--muted-fg); }
.digest-row .time { font-size: 12px; color: var(--muted-fg); }

.article { border: 1px solid var(--border); background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; transition: border-color 0.15s; }
.article:hover { border-color: hsl(172 66% 50% / 0.2); }
.article-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
.article-title { font-size: 16px; font-weight: 600; color: var(--fg); }
.article-title:hover { color: var(--primary); }
.article-meta { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--muted-fg); }
.article-summary { margin-top: 12px; font-size: 14px; line-height: 1.6; color: var(--secondary-fg); }
.article-reason { margin-top: 8px; font-size: 12px; color: var(--muted-fg); font-style: italic; }

.score-bar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.score-track { width: 64px; height: 6px; border-radius: 3px; background: var(--secondary); }
.score-fill { height: 6px; border-radius: 3px; }
.score-fill.high { background: var(--success); }
.score-fill.mid { background: var(--warning); }
.score-fill.low { background: var(--destructive); }
.score-label { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--muted-fg); }

.status-bar { display: flex; height: 16px; border-radius: 999px; overflow: hidden; background: var(--secondary); }
.status-bar .seg-done { background: var(--success); }
.status-bar .seg-failed { background: var(--destructive); }
.status-bar .seg-queued { background: var(--info); }
.status-bar .seg-in_progress { background: var(--warning); }
.status-legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-size: 14px; }
.status-legend div { display: flex; align-items: center; gap: 6px; }
.status-legend .legend-label { color: var(--muted-fg); text-transform: capitalize; }
.status-legend .legend-value { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

.error-box { border: 1px solid hsl(0 72% 55% / 0.3); background: hsl(0 72% 55% / 0.05); border-radius: var(--radius); padding: 16px; display: flex; gap: 12px; }
.error-box .icon { color: var(--destructive); flex-shrink: 0; margin-top: 2px; }
.error-box .stage { font-size: 14px; font-weight: 500; text-transform: capitalize; }
.error-box .msg { font-size: 14px; color: var(--secondary-fg); font-family: 'JetBrains Mono', monospace; margin-top: 4px; word-break: break-word; }
.error-box .ts { font-size: 12px; color: var(--muted-fg); margin-top: 4px; }

.latency-card { border: 1px solid var(--border); background: var(--card); border-radius: var(--radius); padding: 16px; }
.latency-card .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.latency-card .stage-name { font-size: 14px; font-weight: 500; text-transform: capitalize; }
.latency-card .val { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.latency-card .unit { font-size: 14px; color: var(--muted-fg); margin-left: 4px; }
.progress-bar { margin-top: 8px; height: 6px; border-radius: 3px; background: var(--secondary); }
.progress-fill { height: 6px; border-radius: 3px; background: var(--primary); }

.back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; color: var(--muted-fg); margin-bottom: 24px; transition: color 0.15s; }
.back-link:hover { color: var(--fg); }

.view-all { font-size: 12px; color: var(--primary); }
.view-all:hover { text-decoration: underline; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

/* ── Drawer (right-side slide-in panel) ── */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(512px,100vw); z-index: 51; background: var(--card); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; overflow-y: auto; padding: 24px; }
.drawer.open { transform: translateX(0); }
.drawer-close { position: absolute; right: 16px; top: 16px; background: none; border: none; color: var(--muted-fg); cursor: pointer; padding: 4px; border-radius: 2px; opacity: 0.7; transition: opacity 0.15s; }
.drawer-close:hover { opacity: 1; }
.drawer-header { margin-bottom: 24px; padding-right: 32px; }
.drawer-header h2 { font-size: 18px; font-weight: 600; line-height: 1.4; }
.drawer-form { display: flex; flex-direction: column; gap: 20px; flex: 1; }
.drawer-form .form-group { margin-bottom: 0; }
/* Tag input */
.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; background: var(--bg); min-height: 40px; transition: border-color 0.15s, box-shadow 0.15s; cursor: text; }
.tag-input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px hsl(172 66% 50% / 0.2), 0 0 0 4px var(--bg); }
.tag-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--secondary); color: var(--secondary-fg); padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
.tag-chip button { background: none; border: none; color: var(--muted-fg); cursor: pointer; display: flex; align-items: center; padding: 0; transition: color 0.15s; }
.tag-chip button:hover { color: var(--fg); }
.tag-input-inner { border: none; background: transparent; outline: none; color: var(--fg); font-size: 13px; flex: 1; min-width: 80px; padding: 0; font-family: inherit; }
.tag-input-inner::placeholder { color: var(--muted-fg); }
/* Source picker */
.source-search-box { position: relative; margin-bottom: 8px; }
.source-search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted-fg); pointer-events: none; }
.source-search-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px 8px 36px; font-size: 14px; color: var(--fg); font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.source-search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px hsl(172 66% 50% / 0.2), 0 0 0 4px var(--bg); }
.source-search-box input::placeholder { color: var(--muted-fg); }
.filter-pills { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 10px; }
.filter-pill { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: var(--secondary); color: var(--secondary-fg); font-family: inherit; transition: all 0.15s; }
.filter-pill:hover { opacity: 0.8; }
.filter-pill.active { background: var(--primary); color: var(--primary-fg); }
.sources-list { max-height: 224px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.source-card { display: flex; align-items: flex-start; gap: 12px; padding: 8px; border-radius: calc(var(--radius) - 2px); cursor: pointer; transition: background 0.15s; }
.source-card:hover, .source-card.checked { background: var(--secondary); }
.source-cb { width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0; appearance: none; -webkit-appearance: none; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); position: relative; cursor: pointer; transition: all 0.15s; }
.source-cb:checked { background: var(--primary); border-color: var(--primary); }
.source-cb:checked::after { content: ''; position: absolute; left: 4.5px; top: 1.5px; width: 5px; height: 9px; border: solid var(--primary-fg); border-width: 0 2px 2px 0; transform: rotate(45deg); }
.source-name { font-size: 14px; font-weight: 500; }
.source-desc { font-size: 12px; color: var(--muted-fg); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.source-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.source-tag { font-size: 10px; padding: 1px 6px; border-radius: calc(var(--radius) - 4px); background: var(--muted); color: var(--muted-fg); }
.selected-counter { font-size: 12px; color: var(--muted-fg); margin-top: 8px; text-align: right; }
/* Time grid */
.time-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
.time-cell { padding: 6px 2px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--muted-fg); font-size: 10px; font-family: 'JetBrains Mono', monospace; text-align: center; cursor: pointer; transition: all 0.12s; line-height: 1.3; }
.time-cell:hover { border-color: var(--primary); color: var(--fg); }
.time-cell.active { background: var(--primary); border-color: var(--primary); color: var(--primary-fg); font-weight: 600; }
.time-grid-hint { font-size: 11px; color: var(--muted-fg); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: var(--secondary-fg); margin-bottom: 6px; }
.form-hint { font-size: 11px; color: var(--muted-fg); margin-top: 4px; }
.form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-size: 14px; color: var(--fg); font-family: inherit; transition: border-color 0.15s; }
.form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px hsl(172 66% 50% / 0.2), 0 0 0 4px var(--bg); }
.form-input::placeholder { color: var(--muted-fg); }
textarea.form-input { resize: vertical; min-height: 80px; }
select.form-input { appearance: auto; }
.form-checkbox-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; }
.form-checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 6px; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
.form-checkbox-label:hover { background: var(--secondary); }
.form-checkbox-label input { accent-color: var(--primary); }
.form-checkbox-cat { font-size: 10px; color: var(--muted-fg); background: var(--secondary); padding: 1px 6px; border-radius: 4px; }
.form-error { color: var(--destructive); font-size: 13px; margin-top: 12px; display: none; }
.form-error.visible { display: block; }

.toast { position: fixed; top: 20px; right: 20px; z-index: 100; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: slideIn 0.3s ease-out, fadeOut 0.3s ease 3s forwards; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.toast-success { background: hsl(152 60% 45% / 0.2); color: var(--success); border: 1px solid hsl(152 60% 45% / 0.3); }
.toast-error { background: hsl(0 72% 55% / 0.2); color: var(--destructive); border: 1px solid hsl(0 72% 55% / 0.3); }
.toast-warning { background: hsl(38 92% 50% / 0.2); color: var(--warning); border: 1px solid hsl(38 92% 50% / 0.3); }

@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
@keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeOut { from { opacity:1; } to { opacity:0; pointer-events:none; } }
.animate { animation: slideIn 0.3s ease-out; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-cards { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr; }
}
</style>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}
<div class="app">

<aside class="sidebar">
  <div class="sidebar-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span>SmartDigest</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/digests" class="{% if active_page == 'digests' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
      Digests
    </a>
    <a href="/metrics" class="{% if active_page == 'metrics' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
      Metrics
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="email" title="{{ user_email }}">{{ user_email }}</div>
    <form action="/auth/logout" method="POST">
      <button type="submit" class="logout-btn">Log out</button>
    </form>
  </div>
</aside>

<main class="main">
  <div class="content animate">
    {% block content %}{% endblock %}
  </div>
</main>

</div>

<div id="toast-container" aria-live="polite"></div>
{% endblock %}

<script>
function showToast(message, level) {
    var cls = { success: "toast-success", error: "toast-error", warning: "toast-warning" };
    var icons = { success: "✓", error: "✕", warning: "⚠" };
    var container = document.getElementById("toast-container");
    var t = document.createElement("div");
    t.className = "toast " + (cls[level] || cls.success);
    t.setAttribute("role", "alert");
    t.innerHTML = "<strong>" + (icons[level] || "✓") + "</strong> " + message;
    container.appendChild(t);
    setTimeout(function() { t.remove(); }, 3500);
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        var overlay = document.getElementById("drawer-overlay");
        var drawer = document.getElementById("create-drawer");
        if (overlay && overlay.classList.contains("open")) {
            overlay.classList.remove("open");
            if (drawer) drawer.classList.remove("open");
            document.body.style.overflow = "";
        }
    }
});

{% if user_email %}
window.addEventListener("pageshow", function(e) {
    if (e.persisted) window.location.reload();
});
{% endif %}

document.body.addEventListener("htmx:responseError", function(evt) {
    var detail = "Something went wrong";
    try { detail = JSON.parse(evt.detail.xhr.responseText).detail || detail; } catch(e) {}
    showToast(detail, "error");
});
</script>
</body>
</html>
